# k3s uses Traefik ingress by default.
# Requires: cert-manager installed on k3s cluster
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Create ClusterIssuer (once):
#   apiVersion: cert-manager.io/v1
#   kind: ClusterIssuer
#   metadata:
#     name: letsencrypt-prod
#   spec:
#     acme:
#       server: https://acme-v02.api.letsencrypt.org/directory
#       email: your@email.com
#       privateKeySecretRef:
#         name: letsencrypt-prod
#       solvers:
#         - http01:
#             ingress:
#               ingressClassName: traefik
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: app
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.middlewares: "app-redirect-https@kubernetescrd,app-body-size@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - laravel-test.site
        - www.laravel-test.site
        - admin.laravel-test.site
      secretName: app-tls
  rules:
    - host: laravel-test.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-client
                port:
                  number: 3000
    - host: www.laravel-test.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-client
                port:
                  number: 3000
    - host: admin.laravel-test.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-server
                port:
                  number: 80
