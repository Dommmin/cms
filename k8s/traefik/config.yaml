# k3s: configure Traefik to redirect HTTP → HTTPS globally.
#
# Apply FIRST — before Traefik CRDs exist:
#   kubectl apply -f k8s/traefik/config.yaml
#
# Apply AFTER Traefik is Running (CRDs installed):
#   kubectl apply -f k8s/traefik/middleware.yaml
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        redirectTo:
          port: websecure
          priority: 10
    globalArguments:
      - "--global.sendanonymoususage=false"
