apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cms-server-storage
  namespace: cms-prod
spec:
  accessModes:
    - ReadWriteOnce   # single pod — fine for replicas: 1
                      # switch to MinIO/S3 when scaling to replicas: 2+
  storageClassName: local-path   # built into k3s, stores on VPS disk
  resources:
    requests:
      storage: 20Gi
