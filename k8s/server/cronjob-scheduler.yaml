apiVersion: batch/v1
kind: CronJob
metadata:
  name: cms-scheduler
  namespace: cms-prod
  labels:
    app: cms-server
    component: scheduler
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid          # prevent overlapping runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: scheduler
              image: ghcr.io/dommmin/cms-server:latest  # replaced by CI
              imagePullPolicy: IfNotPresent
              command: ["php", "artisan", "schedule:run", "--no-ansi"]
              volumeMounts:
                - name: env-file
                  mountPath: /var/www/html/.env
                  subPath: .env
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: env-file
              secret:
                secretName: cms-server-env
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-pull-secret
