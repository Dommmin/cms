# Applied by CI/CD before rolling out new deployments.
# IMAGE is substituted by the pipeline: sed "s|IMAGE_PLACEHOLDER|$IMAGE|g; s|REVISION_PLACEHOLDER|$SHA|g"
apiVersion: batch/v1
kind: Job
metadata:
  name: cms-migrate-REVISION_PLACEHOLDER
  namespace: cms-prod
  labels:
    app: cms-server
    component: migrate
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      containers:
        - name: migrate
          image: IMAGE_PLACEHOLDER
          command: ["php", "artisan", "migrate", "--force", "--no-ansi"]
          volumeMounts:
            - name: env-file
              mountPath: /var/www/html/.env
              subPath: .env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: env-file
          secret:
            secretName: cms-server-env
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
