apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-gotenberg
  namespace: cms-prod
  labels:
    app: cms-gotenberg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-gotenberg
  template:
    metadata:
      labels:
        app: cms-gotenberg
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
