services:
  php:
    build:
      context: .
      dockerfile: ./.docker/php/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_php
    restart: on-failure
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./server:/var/www/html:delegated
      - ./client:/var/www/client:delegated
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./.docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
      - ./.docker/php/supervisord.conf:/etc/supervisor/supervisord.conf
    ports:
      - "5173:5173"
    networks:
      - cms-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  node:
    build:
      context: .
      dockerfile: ./.docker/node/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_node
    restart: on-failure
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/client
    volumes:
      - ./client:/var/www/client
      - client_node_modules:/var/www/client/node_modules
    environment:
      # Internal URL used by Next.js Server Components to reach Laravel API
      API_URL: http://nginx/api/v1
      # Public URL used by the browser for client-side requests
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    ports:
      - "3000:3000"
    networks:
      - cms-network

  nginx:
    build:
      context: .
      dockerfile: ./.docker/nginx/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_nginx
    restart: on-failure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server:/var/www/html:delegated
      - ./.docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./.docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - php
      - node
    networks:
      - cms-network

  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME}_mysql
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cms-network

  redis:
    image: redis:alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - cms-network

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: ${COMPOSE_PROJECT_NAME}_playwright
    working_dir: /var/www/client
    volumes:
      - ./client:/var/www/client
    environment:
      TEST_BASE_URL: http://node:3000
      CI: "true"
    networks:
      - cms-network
    depends_on:
      - node
    profiles:
      - testing

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${COMPOSE_PROJECT_NAME}_gotenberg
    restart: unless-stopped
    networks:
      - cms-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mailhog
    restart: on-failure
    platform: linux/arm64
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cms-network

networks:
  cms-network:
    driver: bridge

volumes:
  mysql_data:
  client_node_modules:
