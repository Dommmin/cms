name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Build images only (skip K8s deploy)"
        type: boolean
        default: false
      deploy_only:
        description: "Skip lint/test/build — deploy existing :latest images"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  APP_NAME: ${{ vars.APP_NAME || github.event.repository.name }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.event.repository.name }}
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || vars.APP_NAME || github.event.repository.name }}

jobs:
  # ============================================================================
  lint-server-pint:
    # ============================================================================
    name: Lint — server Pint
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-pint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-pint-

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP code style (Pint)
        run: vendor/bin/pint --test

  # ============================================================================
  lint-server-rector:
    # ============================================================================
    name: Lint — server Rector
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-rector-${{ hashFiles('composer.lock') }}
          restore-keys: composer-rector-

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP static analysis (Rector dry-run)
        run: vendor/bin/rector process --dry-run

  # ============================================================================
  lint-server-static:
    # ============================================================================
    name: Lint — server PHP static (Larastan)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-static-${{ hashFiles('composer.lock') }}
          restore-keys: composer-static-

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP static analysis (Larastan)
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

  # ============================================================================
  lint-server-frontend:
    # ============================================================================
    name: Lint — server frontend (Types + ESLint + Prettier)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-frontend-${{ hashFiles('composer.lock') }}
          restore-keys: composer-frontend-

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: |
          touch database/database.sqlite
          php artisan migrate --force

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Frontend types
        run: npm run types

      - name: Frontend lint (ESLint)
        run: npx eslint . --max-warnings=0

      - name: Frontend format check (Prettier)
        run: npm run format:check

  # ============================================================================
  security:
    # ============================================================================
    name: Security Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        working-directory: server
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies (server)
        working-directory: server
        run: npm ci

      - name: Install Node dependencies (client)
        working-directory: client
        run: npm ci

      - name: PHP security audit
        working-directory: server
        run: composer audit

      - name: Node security audit (server)
        working-directory: server
        run: npm audit --audit-level=moderate

      - name: Node security audit (client)
        working-directory: client
        run: npm audit --audit-level=moderate

  # ============================================================================
  lint-client:
    # ============================================================================
    name: Lint — client (Next.js ESLint + Prettier + Types)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Types (TS)
        run: npm run types

      - name: ESLint
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

  # ============================================================================
  test:
    # ============================================================================
    name: Tests — Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}
    strategy:
      matrix:
        php: ['8.4', '8.5']

    services:
      gotenberg:
        image: gotenberg/gotenberg:8
        ports:
          - 3000:3000

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        env:
          GOTENBERG_URL: http://localhost:3000
        run: ./vendor/bin/pest --parallel

  # ============================================================================
  build-server:
    # ============================================================================
    name: Build server image
    runs-on: ubuntu-latest
    needs: [lint-server-pint, lint-server-rector, lint-server-static, lint-server-frontend, lint-client, test, security]
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || !inputs.deploy_only)
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.images.outputs.server }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: images
        run: echo "server=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.server }}:${{ steps.sha.outputs.short }}
            ${{ steps.images.outputs.server }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ============================================================================
  build-client:
    # ============================================================================
    name: Build client image
    runs-on: ubuntu-latest
    needs: [lint-server-pint, lint-server-rector, lint-server-static, lint-server-frontend, lint-client, test, security]
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || !inputs.deploy_only)
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.images.outputs.client }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: images
        run: echo "client=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}-client" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.client }}:${{ steps.sha.outputs.short }}
            ${{ steps.images.outputs.client }}:latest
          build-args: ${{ vars.ENV_CLIENT_PROD }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  # ============================================================================
  deploy:
    # ============================================================================
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    if: |
      always() && !failure() && !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false  # never cancel a running deploy

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: images
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"

          # Use SHA-tagged image if just built; fall back to :latest if build was skipped
          if [ "${{ needs.build-server.result }}" = "success" ]; then
            echo "server=ghcr.io/${OWNER}/${IMAGE_NAME}-server:${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "server=ghcr.io/${OWNER}/${IMAGE_NAME}-server:latest" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ needs.build-client.result }}" = "success" ]; then
            echo "client=ghcr.io/${OWNER}/${IMAGE_NAME}-client:${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "client=ghcr.io/${OWNER}/${IMAGE_NAME}-client:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG_PROD }}" ]; then
            echo "::error::KUBECONFIG_PROD secret is not set."
            echo "::error::Go to GitHub → Settings → Secrets → Actions and add KUBECONFIG_PROD."
            echo "::error::Value: paste the raw content of ~/.kube/config-hetzner (no base64)"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # --------------------------------------------------------------------------
      # 0. Sync production .env → Kubernetes Secret (from GitHub Variables)
      #    PROD_ENV: Settings → Variables → Actions → PROD_ENV
      #    Full .env content — readable & editable in GitHub UI.
      # --------------------------------------------------------------------------
      - name: Sync server secret
        run: |
          if [ -z "$PROD_ENV" ]; then
            echo "::warning::PROD_ENV variable is not set — skipping secret sync."
          else
            APP_NAME="${APP_NAME}" KUBE_NAMESPACE="${KUBE_NAMESPACE}" ./k8s/render.sh k8s/namespace.yaml | kubectl apply -f -
            printf '%s' "$PROD_ENV" > /tmp/prod.env
            kubectl create secret generic "${APP_NAME}-server-env" \
              --from-file=.env=/tmp/prod.env \
              --namespace="${KUBE_NAMESPACE}" \
              --dry-run=client -o yaml | kubectl apply -f -
            rm /tmp/prod.env
            echo "✓ ${APP_NAME}-server-env secret updated"
          fi
        env:
          PROD_ENV: ${{ vars.PROD_ENV }}

      # --------------------------------------------------------------------------
      # 0b. Apply networking and config manifests (always, safe to re-apply)
      # --------------------------------------------------------------------------
      - name: Apply infrastructure manifests
        run: |
          APP_NAME="${APP_NAME}" KUBE_NAMESPACE="${KUBE_NAMESPACE}" ./k8s/render.sh \
            k8s/namespace.yaml \
            k8s/ingress.yaml \
            k8s/traefik/middleware.yaml \
            k8s/server/service.yaml \
            k8s/server/hpa.yaml \
            k8s/client/service.yaml \
            k8s/client/hpa.yaml | kubectl apply -f -
          kubectl apply -f k8s/traefik/config.yaml

      # --------------------------------------------------------------------------
      # 1. Run database migrations (Job with new image, wait for completion)
      # --------------------------------------------------------------------------
      - name: Run migrations
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          IMAGE="${{ steps.images.outputs.server }}"

          APP_NAME="${APP_NAME}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_SERVER="${IMAGE}" \
            REVISION="${SHA}" \
            ./k8s/render.sh k8s/server/job-migrate.yaml | kubectl apply --validate=false -f -

          kubectl -n "${KUBE_NAMESPACE}" wait job/"${APP_NAME}-migrate-${SHA}" \
            --for=condition=complete \
            --timeout=120s

      # --------------------------------------------------------------------------
      # 2. Roll out server (web) — apply full manifest with correct image tag
      # --------------------------------------------------------------------------
      - name: Deploy server
        run: |
          APP_NAME="${APP_NAME}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_SERVER="${{ steps.images.outputs.server }}" \
            ./k8s/render.sh k8s/server/deployment.yaml | kubectl apply -f -
          # .env is mounted through subPath, so Secret updates are only visible
          # after the pod is recreated.
          kubectl -n "${KUBE_NAMESPACE}" rollout restart deployment/"${APP_NAME}-server"
          kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/"${APP_NAME}-server" \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 3. Roll out queue workers
      # --------------------------------------------------------------------------
      - name: Deploy queue workers
        run: |
          APP_NAME="${APP_NAME}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_SERVER="${{ steps.images.outputs.server }}" \
            ./k8s/render.sh k8s/server/deployment-queue.yaml | kubectl apply -f -
          # .env is mounted through subPath, so Secret updates are only visible
          # after the pod is recreated.
          kubectl -n "${KUBE_NAMESPACE}" rollout restart deployment/"${APP_NAME}-queue"
          kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/"${APP_NAME}-queue" \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 4. Update scheduler CronJob
      # --------------------------------------------------------------------------
      - name: Deploy scheduler
        run: |
          APP_NAME="${APP_NAME}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_SERVER="${{ steps.images.outputs.server }}" \
            ./k8s/render.sh k8s/server/cronjob-scheduler.yaml | kubectl apply -f -

      # --------------------------------------------------------------------------
      # 5. Roll out Next.js frontend
      # --------------------------------------------------------------------------
      - name: Deploy client
        run: |
          APP_NAME="${APP_NAME}" \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            IMAGE_CLIENT="${{ steps.images.outputs.client }}" \
            ./k8s/render.sh k8s/client/deployment.yaml | kubectl apply -f -
          kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/"${APP_NAME}-client" \
            --timeout=5m
