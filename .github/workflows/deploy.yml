name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Build images only (skip K8s deploy)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  # Opt in to Node.js 24 runner for Docker actions (removes deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================================================
  lint-server:
  # ============================================================================
    name: Lint — server (Pint + Rector + Larastan + ESLint + Prettier + Types)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: |
          touch database/database.sqlite
          php artisan migrate --force

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate

      - name: PHP code style (Pint)
        run: vendor/bin/pint --test

      - name: PHP static analysis (Rector dry-run)
        run: vendor/bin/rector process --dry-run

      - name: PHP static analysis (Larastan)
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

      - name: Frontend types
        run: npm run types

      - name: Frontend lint (ESLint)
        run: npx eslint . --max-warnings=0

      - name: Frontend format check (Prettier)
        run: npm run format:check

  # ============================================================================
  security:
  # ============================================================================
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        working-directory: server
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies (server)
        working-directory: server
        run: npm ci

      - name: Install Node dependencies (client)
        working-directory: client
        run: npm ci

      - name: PHP security audit
        working-directory: server
        run: composer audit

      - name: Node security audit (server)
        working-directory: server
        run: npm audit --audit-level=moderate

      - name: Node security audit (client)
        working-directory: client
        run: npm audit --audit-level=moderate

  # ============================================================================
  lint-client:
  # ============================================================================
    name: Lint — client (Next.js ESLint + Prettier + Types)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Types (TS)
        run: npm run types

      - name: ESLint
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

  # ============================================================================
  test:
  # ============================================================================
    name: Tests — Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.4', '8.5']

    services:
      gotenberg:
        image: gotenberg/gotenberg:8
        ports:
          - 3000:3000

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        env:
          GOTENBERG_URL: http://localhost:3000
        run: ./vendor/bin/pest --parallel

  # ============================================================================
  build-server:
  # ============================================================================
    name: Build server image
    runs-on: ubuntu-latest
    needs: [lint-server, lint-client, test, security]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.images.outputs.server }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: images
        run: echo "server=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cms-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.server }}:${{ steps.sha.outputs.short }}
            ${{ steps.images.outputs.server }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  build-client:
  # ============================================================================
    name: Build client image
    runs-on: ubuntu-latest
    needs: [lint-server, lint-client, test, security]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.images.outputs.client }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: images
        run: echo "client=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cms-client" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.client }}:${{ steps.sha.outputs.short }}
            ${{ steps.images.outputs.client }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  deploy:
  # ============================================================================
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    if: github.event_name == 'push' && !inputs.skip_deploy
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false  # never cancel a running deploy

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image names
        id: images
        run: |
          echo "server=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cms-server" >> "$GITHUB_OUTPUT"
          echo "client=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cms-client" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG_PROD }}" ]; then
            echo "::error::KUBECONFIG_PROD secret is not set."
            echo "::error::Go to GitHub → Settings → Secrets → Actions and add KUBECONFIG_PROD."
            echo "::error::Value: cat ~/.kube/config-hetzner | base64 | tr -d '\\n'"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # --------------------------------------------------------------------------
      # 0. Sync production .env → Kubernetes Secret (from GitHub Variables)
      #    PROD_ENV: Settings → Variables → Actions → PROD_ENV
      #    Full .env content — readable & editable in GitHub UI.
      # --------------------------------------------------------------------------
      - name: Sync server secret
        run: |
          if [ -z "$PROD_ENV" ]; then
            echo "::warning::PROD_ENV variable is not set — skipping secret sync."
          else
            printf '%s' "$PROD_ENV" > /tmp/prod.env
            kubectl create secret generic cms-server-env \
              --from-file=.env=/tmp/prod.env \
              --namespace=cms-prod \
              --dry-run=client -o yaml | kubectl apply -f -
            rm /tmp/prod.env
            echo "✓ cms-server-env secret updated"
          fi
        env:
          PROD_ENV: ${{ vars.PROD_ENV }}

      # --------------------------------------------------------------------------
      # 1. Run database migrations (Job with new image, wait for completion)
      # --------------------------------------------------------------------------
      - name: Run migrations
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          IMAGE="${{ steps.images.outputs.server }}:${SHA}"

          sed \
            -e "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
            -e "s|REVISION_PLACEHOLDER|${SHA}|g" \
            k8s/server/job-migrate.yaml | kubectl apply --validate=false -f -

          kubectl -n cms-prod wait job/cms-migrate-${SHA} \
            --for=condition=complete \
            --timeout=120s

      # --------------------------------------------------------------------------
      # 2. Roll out server (web)
      # --------------------------------------------------------------------------
      - name: Deploy server
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-server \
            app="${{ steps.images.outputs.server }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-server \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 3. Roll out queue workers (same image)
      # --------------------------------------------------------------------------
      - name: Deploy queue workers
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-queue \
            queue="${{ steps.images.outputs.server }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-queue \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 4. Update scheduler CronJob image
      # --------------------------------------------------------------------------
      - name: Update scheduler image
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image cronjob/cms-scheduler \
            scheduler="${{ steps.images.outputs.server }}:${SHA}"

      # --------------------------------------------------------------------------
      # 5. Roll out Next.js frontend
      # --------------------------------------------------------------------------
      - name: Deploy client
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-client \
            frontend="${{ steps.images.outputs.client }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-client \
            --timeout=5m
