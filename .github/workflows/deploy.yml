name: CI / Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Build images only (skip K8s deploy)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/cms-server
  IMAGE_CLIENT: ghcr.io/${{ github.repository_owner }}/cms-client

jobs:
  # ============================================================================
  lint:
  # ============================================================================
    name: Lint (Pint + Rector + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: PHP code style (Pint)
        run: vendor/bin/pint --test

      - name: PHP static analysis (Rector dry-run)
        run: vendor/bin/rector process --dry-run

      - name: Frontend lint (ESLint)
        run: npx eslint . --max-warnings=0

      - name: Frontend format check (Prettier)
        run: npm run format:check

  # ============================================================================
  test:
  # ============================================================================
    name: Tests (Pest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest --parallel

  # ============================================================================
  build-server:
  # ============================================================================
    name: Build server image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE_SERVER }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_SERVER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  build-client:
  # ============================================================================
    name: Build client image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE_CLIENT }}:${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile.client
          push: true
          tags: |
            ${{ env.IMAGE_CLIENT }}:${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_CLIENT }}:latest
          # NEXT_PUBLIC_* vars baked at build time
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  deploy:
  # ============================================================================
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    if: ${{ !inputs.skip_deploy }}
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false  # never cancel a running deploy

    steps:
      - uses: actions/checkout@v6

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # --------------------------------------------------------------------------
      # 1. Run database migrations (Job with new image, wait for completion)
      # --------------------------------------------------------------------------
      - name: Run migrations
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          IMAGE="${{ env.IMAGE_SERVER }}:${SHA}"

          sed \
            -e "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
            -e "s|REVISION_PLACEHOLDER|${SHA}|g" \
            k8s/server/job-migrate.yaml | kubectl apply -f -

          kubectl -n cms-prod wait job/cms-migrate-${SHA} \
            --for=condition=complete \
            --timeout=120s

      # --------------------------------------------------------------------------
      # 2. Roll out server (web)
      # --------------------------------------------------------------------------
      - name: Deploy server
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-server \
            app="${{ env.IMAGE_SERVER }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-server \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 3. Roll out queue workers (same image)
      # --------------------------------------------------------------------------
      - name: Deploy queue workers
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-queue \
            queue="${{ env.IMAGE_SERVER }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-queue \
            --timeout=5m

      # --------------------------------------------------------------------------
      # 4. Update scheduler CronJob image
      # --------------------------------------------------------------------------
      - name: Update scheduler image
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image cronjob/cms-scheduler \
            scheduler="${{ env.IMAGE_SERVER }}:${SHA}"

      # --------------------------------------------------------------------------
      # 5. Roll out Next.js frontend
      # --------------------------------------------------------------------------
      - name: Deploy client
        run: |
          SHA="${{ steps.sha.outputs.short }}"
          kubectl -n cms-prod set image deployment/cms-client \
            frontend="${{ env.IMAGE_CLIENT }}:${SHA}"
          kubectl -n cms-prod rollout status deployment/cms-client \
            --timeout=5m
