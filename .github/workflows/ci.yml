name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ============================================================================
  lint:
  # ============================================================================
    name: Lint (Pint + Rector + Larastan + ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: PHP code style (Pint)
        run: vendor/bin/pint --test

      - name: PHP static analysis (Rector dry-run)
        run: vendor/bin/rector process --dry-run

      - name: PHP static analysis (Larastan)
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

      - name: Frontend lint (ESLint)
        run: npx eslint . --max-warnings=0

      - name: Frontend format check (Prettier)
        run: npm run format:check

  # ============================================================================
  test:
  # ============================================================================
    name: Tests (Pest — PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.4', '8.5']
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest --parallel
