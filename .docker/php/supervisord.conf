[supervisord]
nodaemon=true
logfile=/var/www/html/storage/logs/supervisord.log

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true

[program:vite]
command=npm run dev -- --host
directory=/var/www/html
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/vite.log
environment=NODE_ENV=development
