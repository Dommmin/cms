server {
    listen 80;
    server_name _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    root /var/www/html/public;
    index index.php;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    charset utf-8;
    client_max_body_size 100M;

    # Laravel storage files served directly
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Laravel / admin SPA routes
    location ~ ^/(api|admin|settings|login|logout|register|forgot-password|reset-password|email|confirm-password|feed|telescope|health|up|docs|sanctum|_ignition|livewire|_debugbar)(/|$) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Everything else → Next.js public frontend
    location / {
        proxy_pass http://node:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_vary on;
}
