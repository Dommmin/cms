# Production nginx — HTTP only (TLS terminated at K8s Ingress / load balancer)
server {
    listen 80 default_server;
    root /var/www/html/public;
    index index.php;
    server_tokens off;

    client_max_body_size 100M;

    # Kubernetes liveness probe (nginx level — no PHP required)
    location = /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Spatie media-library public storage
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Immutable hashed assets (Vite build)
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Block dot-files (except .well-known for ACME challenges)
    location ~ /\.(?!well-known) {
        deny all;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;
}
