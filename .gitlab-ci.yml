stages:
  - lint
  - test
  - build
  - deploy

variables:
  APP_NAME: app
  KUBE_NAMESPACE: $APP_NAME
  SERVER_IMAGE: $CI_REGISTRY_IMAGE/$APP_NAME-server
  CLIENT_IMAGE: $CI_REGISTRY_IMAGE/$APP_NAME-client
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  FF_USE_FASTZIP: "true"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

# ============================================================
# Lint — server
# ============================================================
lint-server:
  stage: lint
  image: php:8.4-cli
  before_script:
    - apt-get update -qq && apt-get install -qq -y git unzip nodejs npm
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cd server
    - cp .env.example .env
    - composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - npm ci
    - php artisan key:generate
    - touch database/database.sqlite
    - php artisan migrate --force
    - php artisan wayfinder:generate
    - vendor/bin/pint --test
    - vendor/bin/rector process --dry-run
    - php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress
    - npm run types
    - npx eslint . --max-warnings=0
    - npm run format:check
  cache:
    key: server-composer-$CI_COMMIT_REF_SLUG
    paths:
      - server/vendor/
      - server/node_modules/

# ============================================================
# Lint — client
# ============================================================
lint-client:
  stage: lint
  image: node:24-slim
  script:
    - cd client
    - npm ci
    - npm run types
    - npm run lint
    - npm run format:check
  cache:
    key: client-node-$CI_COMMIT_REF_SLUG
    paths:
      - client/node_modules/

# ============================================================
# Security
# ============================================================
security:
  stage: lint
  image: php:8.4-cli
  before_script:
    - apt-get update -qq && apt-get install -qq -y git unzip nodejs npm
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cd server && composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist && composer audit
    - cd server && npm ci && npm audit --audit-level=moderate
    - cd client && npm ci && npm audit --audit-level=moderate
  cache:
    key: security-$CI_COMMIT_REF_SLUG
    paths:
      - server/vendor/
      - server/node_modules/
      - client/node_modules/

# ============================================================
# Tests
# ============================================================
test:
  stage: test
  image: php:8.4-cli
  services:
    - name: gotenberg/gotenberg:8
      alias: gotenberg
  variables:
    GOTENBERG_URL: http://gotenberg:3000
  before_script:
    - apt-get update -qq && apt-get install -qq -y git unzip nodejs npm
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cd server
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - npm ci
    - php artisan key:generate
    - php artisan wayfinder:generate
    - npm run build
    - ./vendor/bin/pest --parallel
  cache:
    key: test-$CI_COMMIT_REF_SLUG
    paths:
      - server/vendor/
      - server/node_modules/

# ============================================================
# Build — server image
# ============================================================
build-server:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  needs: [lint-server, lint-client, test, security]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64 \
        --file server/Dockerfile \
        --build-arg SERVER_ENV="$SERVER_ENV" \
        --tag $SERVER_IMAGE:$CI_COMMIT_SHORT_SHA \
        --tag $SERVER_IMAGE:latest \
        --push \
        .

# ============================================================
# Build — client image
# ============================================================
build-client:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
  needs: [lint-server, lint-client, test, security]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64 \
        --file client/Dockerfile \
        $(echo "$ENV_CLIENT_PROD" | grep -v '^#' | grep -v '^$' | sed 's/^/--build-arg /') \
        --tag $CLIENT_IMAGE:$CI_COMMIT_SHORT_SHA \
        --tag $CLIENT_IMAGE:latest \
        --push \
        .

# ============================================================
# Deploy to k3s
# ============================================================
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs: [build-server, build-client]
  environment:
    name: production
    url: https://yourdomain.com
  resource_group: production  # prevent concurrent deploys
  before_script:
    - mkdir -p ~/.kube
    - printf '%s' "$KUBECONFIG" > ~/.kube/config
    - chmod 600 ~/.kube/config
    - export APP_NAME="${APP_NAME:-app}"
    - export KUBE_NAMESPACE="${KUBE_NAMESPACE:-$APP_NAME}"
    - export SERVER_IMAGE="${SERVER_IMAGE:-$CI_REGISTRY_IMAGE/$APP_NAME-server}"
    - export CLIENT_IMAGE="${CLIENT_IMAGE:-$CI_REGISTRY_IMAGE/$APP_NAME-client}"
  script:
    - SHA=$CI_COMMIT_SHORT_SHA

    # 0. Ensure namespace/config exists
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" ./k8s/render.sh k8s/namespace.yaml k8s/traefik/middleware.yaml k8s/ingress.yaml k8s/server/service.yaml k8s/server/hpa.yaml k8s/client/service.yaml k8s/client/hpa.yaml | kubectl apply -f -
    - kubectl apply -f k8s/traefik/config.yaml
    - |
      if [ -n "$SERVER_ENV" ]; then
        printf '%s' "$SERVER_ENV" > /tmp/prod.env
        kubectl create secret generic "${APP_NAME}-server-env" \
          --from-file=.env=/tmp/prod.env \
          --namespace="$KUBE_NAMESPACE" \
          --dry-run=client -o yaml | kubectl apply -f -
        rm /tmp/prod.env
      fi

    # 1. Run migrations
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" IMAGE_SERVER="${SERVER_IMAGE}:${SHA}" REVISION="$SHA" ./k8s/render.sh k8s/server/job-migrate.yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" wait job/${APP_NAME}-migrate-$SHA --for=condition=complete --timeout=120s

    # 2. Deploy server
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" IMAGE_SERVER="${SERVER_IMAGE}:${SHA}" ./k8s/render.sh k8s/server/deployment.yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/${APP_NAME}-server --timeout=5m

    # 3. Deploy queue workers
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" IMAGE_SERVER="${SERVER_IMAGE}:${SHA}" ./k8s/render.sh k8s/server/deployment-queue.yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/${APP_NAME}-queue --timeout=5m

    # 4. Update scheduler
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" IMAGE_SERVER="${SERVER_IMAGE}:${SHA}" ./k8s/render.sh k8s/server/cronjob-scheduler.yaml | kubectl apply -f -

    # 5. Deploy client
    - APP_NAME="$APP_NAME" KUBE_NAMESPACE="$KUBE_NAMESPACE" IMAGE_CLIENT="${CLIENT_IMAGE}:${SHA}" ./k8s/render.sh k8s/client/deployment.yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/${APP_NAME}-client --timeout=5m
