# =============================================================================
# Blue-Green Production Compose
#
# Usage:
#   ACTIVE_SLOT=blue  APP_VERSION=abc1234 docker compose -f docker-compose.prod.yml up -d
#
# The "green" profile must be explicitly activated for the green slot to start:
#   docker compose -f docker-compose.prod.yml --profile green up -d app_green
#
# The deploy script (scripts/deploy.sh) manages slot switching automatically.
# =============================================================================

x-app-common: &app-common
  image: ghcr.io/${GITHUB_REPOSITORY}/cms-server:${APP_VERSION:-latest}
  restart: unless-stopped
  environment:
    APP_ENV: production
    APP_DEBUG: "false"
    APP_KEY: ${APP_KEY}
    APP_URL: ${APP_URL}
    APP_VERSION: ${APP_VERSION:-unknown}

    DB_CONNECTION: mysql
    DB_HOST: ${DB_HOST:-mysql}
    DB_PORT: ${DB_PORT:-3306}
    DB_DATABASE: ${DB_DATABASE}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}

    REDIS_HOST: ${REDIS_HOST:-redis}
    REDIS_PORT: ${REDIS_PORT:-6379}
    REDIS_PASSWORD: ${REDIS_PASSWORD:-}

    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis

    MAIL_MAILER: ${MAIL_MAILER:-smtp}
    MAIL_HOST: ${MAIL_HOST}
    MAIL_PORT: ${MAIL_PORT:-587}
    MAIL_USERNAME: ${MAIL_USERNAME:-}
    MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
    MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
    MAIL_FROM_NAME: ${MAIL_FROM_NAME}

    SCOUT_DRIVER: typesense
    TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
    TYPESENSE_PORT: ${TYPESENSE_PORT:-8108}
    TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL:-http}
    TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}

    FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    AWS_BUCKET: ${AWS_BUCKET:-}
  networks:
    - cms-prod-network
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # Blue slot — always-on primary
  # ---------------------------------------------------------------------------
  app_blue:
    <<: *app-common
    container_name: cms_app_blue
    environment:
      <<: *app-common
      APP_SLOT: blue
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Green slot — started only during green deploy (profile=green)
  # ---------------------------------------------------------------------------
  app_green:
    <<: *app-common
    container_name: cms_app_green
    environment:
      <<: *app-common
      APP_SLOT: green
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles:
      - green

  # ---------------------------------------------------------------------------
  # Nginx — routes to the active slot via envsubst template
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cms_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      ACTIVE_SLOT: ${ACTIVE_SLOT:-blue}
    volumes:
      - ./docker/nginx/blue-green/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - app_storage:/var/www/html/storage/app/public:ro
    networks:
      - cms-prod-network
    depends_on:
      - app_blue

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/cms-client:${APP_VERSION:-latest}
    container_name: cms_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://nginx/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - cms-prod-network
    depends_on:
      - nginx

  # ---------------------------------------------------------------------------
  # MySQL
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --slow-query-log=1
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - cms-prod-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_prod_data:/data
    networks:
      - cms-prod-network

  # ---------------------------------------------------------------------------
  # Typesense
  # ---------------------------------------------------------------------------
  typesense:
    image: typesense/typesense:27.1
    container_name: cms_typesense
    restart: unless-stopped
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port=8108
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8108/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - typesense_prod_data:/data
    networks:
      - cms-prod-network

networks:
  cms-prod-network:
    driver: bridge

volumes:
  mysql_prod_data:
  redis_prod_data:
  typesense_prod_data:
  app_storage:
